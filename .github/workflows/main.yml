name: Deploy API to SERVER

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  APP_NAME: paytract_api
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/paytract_api
  HOST: ${{ secrets.SERVER_HOST }}
  USER: ${{ secrets.SERVER_USER }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image to GHCR
        run: |
          docker build -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy to SERVER
        run: |
          ssh -o StrictHostKeyChecking=no $USER@$HOST << EOF
            # Log in to GHCR on SERVER
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the image from GHCR
            docker pull $IMAGE_NAME:latest

            # Navigate to or create app directory
            mkdir -p /home/$USER/paytract_api
            cd /home/$USER/paytract_api

            exit
          EOF

      - name: Copy setup files to SERVER
        run: |
          scp -o StrictHostKeyChecking=no docker-compose.yml  $USER@$HOST:/home/$USER/paytract_api/

      - name: Final deploy step via SSH
        run: |
          ssh -o StrictHostKeyChecking=no $USER@$HOST << EOF
            cd /home/$USER/paytract_api

            # Create .env with secrets
            
            echo 'ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}' >> .env
            echo 'SECRET_KEY=${{ secrets.SECRET_KEY }}' >> .env
            echo 'ACCESS_TOKEN_EXPIRY=${{ secrets.ACCESS_TOKEN_EXPIRY }}' >> .env
            echo 'REFRESH_TOKEN_EXPIRY=${{ secrets.REFRESH_TOKEN_EXPIRY }}' >> .env
            
            echo 'DB_NAME=${{ secrets.DB_NAME }}' >> .env
            echo 'DB_USER=${{ secrets.DB_USER }}' >> .env
            echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' >> .env
            echo 'DB_HOST=${{ secrets.DB_HOST }}' >> .env
            echo 'DB_PORT=${{ secrets.DB_PORT }}' >> .env

            echo 'REDIS_URL=${{ secrets.REDIS_URL }}' >> .env

            echo 'RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}' >> .env
            echo 'RESEND_EMAIL=${{ secrets.RESEND_EMAIL }}' >> .env

           
            # Modify docker-compose.yml to use GHCR image
            sed -i "s|^\([[:space:]]*\)build:.*|\\1image: $IMAGE_NAME:latest|" docker-compose.yml
            sed -i '/^[[:space:]]*context:/d; /^[[:space:]]*dockerfile:/d' docker-compose.yml

            docker compose -f docker-compose.yml down || true
            docker compose -f docker-compose.yml up -d

            # Run database migrations
            docker compose -f docker-compose.yml exec app just migrate-up

            rm .env
            docker image prune -af
          EOF
